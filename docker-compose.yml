version: '3.8'

services:
  # 1. Our custom Go Application
  api:
    build: .
    container_name: uptime-api
    ports:
      - "8080:8080"
    environment:
      # Here we tell Go the EXACT names of the other containers!
      - REDIS_ADDR=${REDIS_ADDR}
      - POSTGRES_DSN=${POSTGRES_DSN}
      - WORKER_COUNT=${WORKER_COUNT}
      - SMTP_USER=${SMTP_USER}    # Keep your Gmail here
      - SMTP_PASS=${SMTP_PASS}     # Keep your 16-letter App Password here
    depends_on:
      - redis
      - postgres
    restart: always

  # 2. Redis Buffer
  redis:
    image: redis:alpine
    container_name: uptime-redis
    ports:
      - "6379:6379"
    restart: always

  # 3. Permanent Storage
  postgres:
    image: postgres:15-alpine
    container_name: uptime-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    restart: always