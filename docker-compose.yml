services:
  # Go uptime engine: REST API, worker pool, Redis buffer flush, and email alerts.
  # Loads app config from .env (REDIS_ADDR, POSTGRES_DSN, WORKER_COUNT, SMTP_*).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_ORIGIN: http://api:8080
    container_name: uptime-frontend
    ports:
      - "3000:3000"
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  api:
    build: .
    container_name: uptime-api
    env_file:
      - .env
    ports:
      # Localhost only — not exposed on your LAN
      - "127.0.0.1:8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Fast write buffer between workers and Postgres (list key: ping_buffer).
  redis:
    image: redis:7.4-alpine
    container_name: uptime-redis
    ports:
      # Optional: redis-cli from the host. Containers reach Redis at redis:6379
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # Permanent storage for active_monitors and ping_results.
  postgres:
    image: postgres:15-alpine
    container_name: uptime-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Optional: pgAdmin/DBeaver from the host. Containers reach Postgres at postgres:5432
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: uptime-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: uptime-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
